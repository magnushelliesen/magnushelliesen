name: Generate profile metrics

on:
  schedule:
    - cron: "0 5 * * *"   # kjør daglig kl 05:00 UTC
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Output
          filename: stats/metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update profile metrics"

          # Auth
          token: ${{ secrets.METRICS_TOKEN || github.token }}

          # Profil
          user: magnushelliesen
          template: classic
          base: header, repositories, activity, community

          # Språk (tilsvarer Top Languages)
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 2%

          # Commit-aktivitet og “streak”-nært signal
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Utseende
          config_timezone: Europe/Oslo
          config_twemoji: yes

      - name: Ensure stats dir exists
        run: mkdir -p stats

      - name: Commit metrics (if not committed by action)
        run: |
          git add stats/metrics.svg
          git diff --cached --quiet || \
            (git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "chore(metrics): update profile metrics" && git push)
